<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Report tagliandi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f4f7; --surface: #ffffff; --border: #dde1e9; --border-strong: #b8bfcc;
    --ink: #0d1117; --ink-muted: #6b7280;
    --accent: #4a7fc1; --accent-light: #eef4fc; --accent-hover: #3567a8;
    --accent-dark: #1e3a5f;
    --green: #1a7a4a; --green-light: #e6f4ed;
    --blue: #4a7fc1; --blue-light: #eef4fc;
    --yellow-light: #fffbeb; --yellow: #92400e;
    --red: #cc1c2e;
    --mono: 'JetBrains Mono', monospace; --sans: 'Nunito', sans-serif; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; padding-bottom: 5.5rem; }

  .header {
    background: #ffffff; color: var(--ink);
    padding: .85rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--accent);
    box-shadow: 0 2px 12px rgba(74,127,193,.1);
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .logo-riolo {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 1.55rem; color: var(--accent);
    letter-spacing: -.03em; line-height: 1;
  }
  .header-divider { width: 1px; height: 24px; background: var(--border); }
  .header-sede { font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-muted); }
  .header-title { font-size: .85rem; font-weight: 700; color: var(--ink); margin-top: .1rem; }
  .header-date { font-family: var(--mono); font-size: .72rem; color: white; background: var(--accent); padding: .25rem .65rem; border-radius: 99px; font-weight: 600; }

  .setup-notice { margin: 1rem 1.5rem 0; background: #fff8f0; border: 1px solid #f4c490; border-left: 4px solid var(--accent); border-radius: var(--radius); padding: .9rem 1.1rem; font-size: .83rem; line-height: 1.6; }
  .setup-notice strong { color: var(--accent); }

  .page { padding: 1.2rem 1.5rem; max-width: 600px; margin: 0 auto; }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
  .section-header { padding: .75rem 1.2rem; background: var(--accent-dark); color: #ffffff; display: flex; align-items: center; gap: .5rem; border-bottom: 2px solid var(--accent); }
  .section-icon { font-size: .95rem; }
  .section-title { font-family: var(--sans); font-size: .72rem; letter-spacing: .04em; text-transform: uppercase; font-weight: 700; }

  .field-row { display: flex; align-items: center; padding: .8rem 1.2rem; border-bottom: 1px solid var(--border); gap: 1rem; transition: background .15s; }
  .field-row:last-child { border-bottom: none; }
  .field-row:focus-within { background: var(--accent-light); }
  .field-label { flex: 1; font-size: .88rem; font-weight: 600; }
  .field-label.muted { color: var(--ink-muted); font-weight: 400; font-size: .83rem; }
  .tag-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: .4rem; vertical-align: middle; }
  .srs-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-left: .3rem; vertical-align: middle; }

  .num-input {
    width: 80px; text-align: right; border: 1px solid var(--border-strong); border-radius: var(--radius);
    padding: .45rem .7rem; font-family: var(--mono); font-size: 1rem; font-weight: 500;
    color: var(--ink); background: var(--bg); -webkit-appearance: none;
    transition: border-color .2s, background .2s, color .2s;
  }
  .num-input:focus { outline: none; border-color: var(--accent); background: white; }
  .num-input.has-value-tag { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 700; }
  .num-input.has-value { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* Subtotale sezione */
  .section-subtotal {
    display: flex; align-items: center; justify-content: space-between;
    padding: .6rem 1.2rem; background: var(--accent-light); border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: .72rem;
  }
  .section-subtotal-label { color: var(--ink-muted); }
  .section-subtotal-value { color: var(--accent); font-weight: 700; }

  /* Nota riprogrammazioni */
  .nota-row { padding: .5rem 1.2rem; background: var(--yellow-light); border-top: 1px solid #fde68a; font-family: var(--mono); font-size: .62rem; color: var(--yellow); }

  .select-wrap { position: relative; flex: 1; max-width: 220px; }
  .select-wrap::after { content: '▾'; position: absolute; right: .8rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-muted); font-size: .8rem; }
  select { width: 100%; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: .5rem .8rem; font-family: var(--sans); font-size: .9rem; color: var(--ink); background: var(--bg); appearance: none; }
  select:focus { outline: none; border-color: var(--accent); }

  .time-input { width: 88px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: .45rem .6rem; font-family: var(--mono); font-size: .88rem; color: var(--ink); background: var(--bg); text-align: center; }
  .time-input:focus { outline: none; border-color: var(--accent); background: white; }

  .ore-pill { display: inline-flex; align-items: center; gap: .4rem; background: var(--blue-light); border: 1px solid #bfdbfe; border-radius: 99px; padding: .3rem .8rem; font-family: var(--mono); font-size: .72rem; color: var(--blue); }
  .ore-row { padding: .8rem 1.2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; border-bottom: 1px solid var(--border); background: var(--blue-light); }

  .assenza-options { padding: .8rem 1.2rem; display: flex; flex-direction: column; gap: .6rem; border-bottom: 1px solid var(--border); }
  .radio-row { display: flex; align-items: center; gap: .7rem; cursor: pointer; }
  .radio-row input[type=radio] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .radio-label { font-size: .88rem; font-weight: 600; }
  .assenza-detail { padding: .8rem 1.2rem; display: none; background: var(--yellow-light); border-bottom: 1px solid var(--border); }
  .assenza-detail.show { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
  .assenza-label { font-size: .83rem; color: var(--yellow); font-weight: 500; }
  .turno-sep { color: var(--ink-muted); font-family: var(--mono); font-size: .8rem; }

  .extra-list { padding: .8rem 1.2rem; display: flex; flex-direction: column; gap: .7rem; }
  .extra-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: .7rem .9rem; display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
  .extra-item .select-wrap { max-width: 170px; flex: 1; }
  .extra-time { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
  .extra-dur { width: 65px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: .4rem .5rem; font-family: var(--mono); font-size: .82rem; text-align: center; background: var(--bg); }
  .extra-dur:focus { outline: none; border-color: var(--accent); }
  .remove-btn { background: none; border: none; color: var(--ink-muted); font-size: 1.1rem; cursor: pointer; padding: .2rem; line-height: 1; margin-left: auto; flex-shrink: 0; }
  .remove-btn:hover { color: #c0392b; }
  .add-extra-btn { width: 100%; background: none; border: 1px dashed var(--border-strong); border-radius: var(--radius); padding: .65rem; color: var(--ink-muted); font-family: var(--sans); font-size: .78rem; letter-spacing: .02em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: all .2s; }
  .add-extra-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .ore-srs-bar { padding: .85rem 1.2rem; background: var(--green-light); border-top: 2px solid var(--green); display: flex; align-items: center; justify-content: space-between; }
  .ore-srs-label { font-family: var(--mono); font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: var(--green); }
  .ore-srs-value { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--green); }
  .ore-srs-detail { font-family: var(--mono); font-size: .65rem; color: var(--green); opacity: .7; margin-top: .1rem; }

  textarea { width: 100%; border: none; border-top: 1px solid var(--border); padding: 1rem 1.2rem; font-family: var(--sans); font-size: .88rem; color: var(--ink); background: var(--surface); resize: vertical; min-height: 80px; line-height: 1.6; }
  textarea:focus { outline: none; background: var(--accent-light); }
  textarea::placeholder { color: var(--ink-muted); }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent-dark); color: white; padding: .9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; border-top: 3px solid var(--accent); z-index: 200; box-shadow: 0 -4px 20px rgba(74,127,193,.25); }
  .totale-left { display: flex; flex-direction: column; gap: .15rem; }
  .totale-label { font-family: var(--mono); font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: #7a7870; }
  .totale-value { font-family: var(--mono); font-size: 1.9rem; font-weight: 500; color: var(--accent); line-height: 1; }
  .submit-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: .8rem 1.6rem; font-family: var(--sans); font-size: .82rem; letter-spacing: .04em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: background .2s, transform .1s, box-shadow .2s; white-space: nowrap; box-shadow: 0 2px 8px rgba(74,127,193,.35); }
  .submit-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(74,127,193,.5); }
  .submit-btn:active { transform: scale(.97); }
  .submit-btn:disabled { background: #555; cursor: not-allowed; }

  .success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem; }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 4rem; margin-bottom: 1rem; animation: pop .4s ease; }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  .success-title { font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
  .success-sub { color: var(--ink-muted); font-family: var(--mono); font-size: .8rem; margin-bottom: .5rem; }
  .success-ore { color: var(--green); font-family: var(--mono); font-size: .78rem; margin-bottom: 2rem; }
  .new-report-btn { background: var(--ink); color: white; border: none; border-radius: var(--radius); padding: .8rem 1.6rem; font-family: var(--mono); font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; }

  .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(10px); background: #c0392b; color: white; padding: .65rem 1.4rem; border-radius: 99px; font-size: .82rem; font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 300; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 380px) { .header { padding: 1rem; } .page { padding: 1rem; } }

  /* Operatori bonus */
  .bonus-list { padding: .8rem 1.2rem; display: flex; flex-direction: column; gap: .6rem; }
  .bonus-item { display: flex; align-items: center; gap: .6rem; }
  .bonus-nome {
    flex: 1; border: 1px solid var(--border-strong); border-radius: var(--radius);
    padding: .45rem .7rem; font-family: var(--sans); font-size: .88rem; color: var(--ink);
    background: var(--bg);
  }
  .bonus-nome:focus { outline: none; border-color: var(--accent); background: white; }
  .bonus-nome::placeholder { color: var(--ink-muted); }
  .bonus-num {
    width: 72px; text-align: right; border: 1px solid var(--border-strong); border-radius: var(--radius);
    padding: .45rem .6rem; font-family: var(--mono); font-size: 1rem; font-weight: 600;
    color: var(--ink); background: var(--bg); -webkit-appearance: none;
  }
  .bonus-num:focus { outline: none; border-color: var(--green); background: white; }
  .bonus-remove { background: none; border: none; color: var(--ink-muted); font-size: 1.1rem; cursor: pointer; padding: .2rem; flex-shrink: 0; }
  .bonus-remove:hover { color: var(--red); }
  .add-bonus-btn {
    width: 100%; background: none; border: 1px dashed var(--border-strong); border-radius: var(--radius);
    padding: .65rem; color: var(--ink-muted); font-family: var(--sans); font-size: .78rem;
    letter-spacing: .02em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .add-bonus-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo-riolo">riolo</span>
    <div class="header-divider"></div>
    <div>
      <div class="header-sede" id="header-sede"></div>
      <div class="header-title">Report tagliandi</div>
    </div>
  </div>
  <span class="header-date" id="header-date"></span>
</div>

<div class="toast" id="toast"></div>

<div id="form-view">
  <div id="setup-notice" class="setup-notice" style="display:none">
    ⚠️ <strong>Setup non completato.</strong> Inserisci l'URL Google Apps Script in <code>config.js</code>.
  </div>

  <div class="page">

    <!-- 1. OPERATRICE -->
    <div class="section">
      <div class="section-header"><span class="section-icon">👤</span><span class="section-title">Operatrice</span></div>
      <div class="field-row">
        <span class="field-label">Operatrice</span>
        <div class="select-wrap">
          <select id="sel-operatrice" onchange="onOperatriceChange()">
            <option value="">— seleziona —</option>
          </select>
        </div>
      </div>
      <div id="ore-auto-row" class="ore-row" style="display:none">
        <span class="field-label muted">Ore presenza standard</span>
        <span class="ore-pill" id="ore-auto-label">— h</span>
      </div>
      <div id="ore-manuale-row" class="field-row" style="display:none">
        <span class="field-label muted">Ore di presenza oggi</span>
        <input type="number" id="ore-manuale" class="num-input" min="0" max="12" step="0.5" value="8" oninput="ricalcolaOreSRS()">
      </div>
    </div>

    <!-- 2. ASSENZE -->
    <div class="section">
      <div class="section-header"><span class="section-icon">📅</span><span class="section-title">Assenze</span></div>
      <div class="assenza-options">
        <label class="radio-row"><input type="radio" name="assenza" value="nessuna" checked onchange="onAssenzaChange()"><span class="radio-label">Nessuna assenza</span></label>
        <label class="radio-row"><input type="radio" name="assenza" value="permesso" onchange="onAssenzaChange()"><span class="radio-label">Permesso (ore)</span></label>
        <label class="radio-row"><input type="radio" name="assenza" value="ferie" onchange="onAssenzaChange()"><span class="radio-label">Ferie / Assenza intera giornata</span></label>
      </div>
      <div class="assenza-detail" id="assenza-permesso-detail">
        <span class="assenza-label">⏱ Permesso</span>
        <input type="time" class="time-input" id="permesso-dalle" onchange="ricalcolaOreSRS()">
        <span class="turno-sep">→</span>
        <input type="time" class="time-input" id="permesso-alle" onchange="ricalcolaOreSRS()">
      </div>
    </div>

    <!-- 3. ATTIVITÀ EXTRA SRS -->
    <div class="section">
      <div class="section-header"><span class="section-icon">🔄</span><span class="section-title">Attività extra SRS</span></div>
      <div class="extra-list" id="extra-list"></div>
      <div style="padding:.8rem 1.2rem; border-top: 1px solid var(--border);">
        <button class="add-extra-btn" onclick="addExtraRow()">+ Aggiungi attività extra</button>
      </div>
      <div class="ore-srs-bar" id="ore-srs-bar">
        <div>
          <div class="ore-srs-label">Ore SRS pure</div>
          <div class="ore-srs-detail" id="ore-srs-detail">—</div>
        </div>
        <div class="ore-srs-value" id="ore-srs-value">— h</div>
      </div>
    </div>

    <!-- 4. SEZIONI DINAMICHE DA CONFIG.SEZIONI -->
    <div id="sezioni-container"></div>

    <!-- 5. OPERATORI BONUS -->
    <div class="section">
      <div class="section-header"><span class="section-icon">👥</span><span class="section-title">Operatori bonus</span></div>
      <div class="bonus-list" id="bonus-list"></div>
      <div style="padding:.8rem 1.2rem; border-top: 1px solid var(--border);">
        <button class="add-bonus-btn" onclick="addBonusRow()">+ Aggiungi operatore bonus</button>
      </div>
    </div>

    <!-- 6. NOTE -->
    <div class="section">
      <div class="section-header"><span class="section-icon">📝</span><span class="section-title">Note libere</span></div>
      <textarea id="note" placeholder="Eventuali note aggiuntive..."></textarea>
    </div>

  </div>
</div>

<div class="success-screen" id="success-view">
  <div class="success-icon">✅</div>
  <div class="success-title" id="success-title">Report inviato!</div>
  <div class="success-sub" id="success-sub"></div>
  <div class="success-ore" id="success-ore"></div>
  <button class="new-report-btn" onclick="newReport()">+ Nuovo report</button>
</div>

<div class="bottom-bar" id="bottom-bar">
  <div class="totale-left">
    <span class="totale-label">Totale Tagliandi</span>
    <span class="totale-value" id="totale">0</span>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">✓ Invia Report</button>
</div>

<script src="config.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('header-sede').textContent = CONFIG.sede;
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'numeric'});

  if (CONFIG.googleSheets.scriptUrl.includes('INCOLLA_QUI')) {
    document.getElementById('setup-notice').style.display = 'block';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = '⚙ Setup richiesto';
  }

  // Popola select — solo operatrici principali
  const sel = document.getElementById('sel-operatrice');
  CONFIG.operatrici.filter(op => op.principale).forEach(op => {
    const o = document.createElement('option');
    o.value = o.textContent = op.nome;
    sel.appendChild(o);
  });

  // Genera sezioni dinamiche da CONFIG.sezioni
  const container = document.getElementById('sezioni-container');
  CONFIG.sezioni.forEach(sez => {
    const hasRiprog = sez.categorie.some(c => c.id === 'cd_riprogrammazione');
    const sec = document.createElement('div');
    sec.className = 'section';

    let rows = sez.categorie.map(cat => {
      const dots = cat.tagliando ? '<span class="tag-dot"></span>' : '';
      return `
        <div class="field-row">
          <label class="field-label" for="c-${cat.id}">${cat.label}${dots}</label>
          <input type="number" id="c-${cat.id}"
            class="num-input" min="0" value="0" inputmode="numeric"
            oninput="onNumInput(this, '${cat.id}', ${cat.tagliando})">
        </div>`;
    }).join('');

    // Subtotale tagliandi per la sezione (solo se ha tagliandi)
    const tagIds = sez.categorie.filter(c => c.tagliando).map(c => c.id);
    const subtotale = tagIds.length ? `
      <div class="section-subtotal">
        <span class="section-subtotal-label">Tagliandi ${sez.label.toLowerCase()}</span>
        <span class="section-subtotal-value" id="sub-${sez.id}">0</span>
      </div>` : '';

    const notaRiprog = hasRiprog
      ? `<div class="nota-row">⚠ Le riprogrammazioni non contano nel totale tagliandi</div>`
      : '';

    sec.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${sez.icon}</span>
        <span class="section-title">${sez.label}</span>
      </div>
      ${rows}
      ${notaRiprog}
      ${subtotale}`;

    container.appendChild(sec);
  });

  ricalcolaOreSRS();
});

// ── Operatrice ────────────────────────────────────────────────
function onOperatriceChange() {
  const nome = document.getElementById('sel-operatrice').value;
  const op = getOperatrice(nome);
  const autoRow = document.getElementById('ore-auto-row');
  const manRow  = document.getElementById('ore-manuale-row');
  if (op && op.orario && op.orario.length > 0) {
    const ore = calcolaOrePresenza(op.orario);
    document.getElementById('ore-auto-label').textContent =
      `${ore}h (${op.orario.map(f => f.dalle+'–'+f.alle).join(', ')})`;
    autoRow.style.display = 'flex';
    manRow.style.display  = 'none';
  } else {
    autoRow.style.display = 'none';
    manRow.style.display  = 'flex';
  }
  ricalcolaOreSRS();
}

// ── Assenze ───────────────────────────────────────────────────
function onAssenzaChange() {
  const val = document.querySelector('input[name=assenza]:checked').value;
  document.getElementById('assenza-permesso-detail').classList.toggle('show', val === 'permesso');
  ricalcolaOreSRS();
}

// ── Extra SRS ─────────────────────────────────────────────────
let extraCount = 0;
function addExtraRow() {
  const id = ++extraCount;
  const list = document.getElementById('extra-list');
  const item = document.createElement('div');
  item.className = 'extra-item';
  item.id = `extra-${id}`;
  item.innerHTML = `
    <div class="select-wrap">
      <select id="extra-tipo-${id}" onchange="ricalcolaOreSRS()">
        ${CONFIG.attivitaExtra.map(a => `<option value="${a}">${a}</option>`).join('')}
      </select>
    </div>
    <div class="extra-time">
      <input type="time" class="time-input" id="extra-dalle-${id}" oninput="onExtraTimeInput(${id})">
      <span class="turno-sep">→</span>
      <input type="time" class="time-input" id="extra-alle-${id}"  oninput="onExtraTimeInput(${id})">
      <span style="color:var(--ink-muted);font-family:var(--mono);font-size:.7rem">o</span>
      <input type="number" class="extra-dur" id="extra-min-${id}" placeholder="min" min="1" max="480" oninput="onExtraDurInput(${id})">
      <span style="font-family:var(--mono);font-size:.7rem;color:var(--ink-muted)">min</span>
    </div>
    <button class="remove-btn" onclick="removeExtra(${id})">✕</button>`;
  list.appendChild(item);
  ricalcolaOreSRS();
}
function onExtraTimeInput(id) { document.getElementById(`extra-min-${id}`).value = ''; ricalcolaOreSRS(); }
function onExtraDurInput(id)  { document.getElementById(`extra-dalle-${id}`).value = ''; document.getElementById(`extra-alle-${id}`).value = ''; ricalcolaOreSRS(); }
function removeExtra(id)      { document.getElementById(`extra-${id}`)?.remove(); ricalcolaOreSRS(); }

function getExtraItems() {
  const items = [];
  document.querySelectorAll('.extra-item').forEach(el => {
    const id    = el.id.replace('extra-', '');
    const tipo  = document.getElementById(`extra-tipo-${id}`)?.value || '';
    const dalle = document.getElementById(`extra-dalle-${id}`)?.value || '';
    const alle  = document.getElementById(`extra-alle-${id}`)?.value  || '';
    const min   = parseInt(document.getElementById(`extra-min-${id}`)?.value) || 0;
    let minuti  = dalle && alle ? timeToMin(alle) - timeToMin(dalle) : min;
    if (minuti > 0) items.push({ tipo, dalle, alle, minuti });
  });
  return items;
}

// ── Ore SRS ───────────────────────────────────────────────────
function ricalcolaOreSRS() {
  const nome = document.getElementById('sel-operatrice').value;
  const op   = getOperatrice(nome);
  const assenza = document.querySelector('input[name=assenza]:checked')?.value || 'nessuna';

  let orePresenza = op && op.orario && op.orario.length > 0
    ? calcolaOrePresenza(op.orario)
    : parseFloat(document.getElementById('ore-manuale')?.value) || 0;

  let oreAssenza = 0;
  if (assenza === 'ferie') {
    oreAssenza = orePresenza;
  } else if (assenza === 'permesso') {
    const pd = document.getElementById('permesso-dalle')?.value;
    const pa = document.getElementById('permesso-alle')?.value;
    if (pd && pa) oreAssenza = (timeToMin(pa) - timeToMin(pd)) / 60;
  }

  const extras   = getExtraItems();
  const oreExtra = extras.reduce((s, e) => s + e.minuti / 60, 0);
  const oreSRS   = Math.max(0, orePresenza - oreAssenza - oreExtra);

  const detailParts = [];
  if (oreAssenza > 0) detailParts.push(`-${oreAssenza.toFixed(1)}h assenza`);
  extras.forEach(e => detailParts.push(`-${(e.minuti/60).toFixed(1)}h ${e.tipo}`));

  document.getElementById('ore-srs-value').textContent  = `${oreSRS.toFixed(1)}h`;
  document.getElementById('ore-srs-detail').textContent =
    detailParts.length ? `${orePresenza}h presenza ${detailParts.join(' ')}` : `${orePresenza}h presenza`;
}

// ── Input numeri ──────────────────────────────────────────────
function onNumInput(el, catId, isTag) {
  const v = parseInt(el.value) || 0;
  el.classList.toggle('has-value-tag', isTag && v > 0);
  el.classList.toggle('has-value', !isTag && v > 0);
  updateTotali();
}

function updateTotali() {
  let totale = 0;
  CONFIG.sezioni.forEach(sez => {
    let subTot = 0;
    sez.categorie.forEach(cat => {
      const v = parseInt(document.getElementById('c-' + cat.id)?.value) || 0;
      if (cat.tagliando) { subTot += v; totale += v; }
    });
    const subEl = document.getElementById('sub-' + sez.id);
    if (subEl) subEl.textContent = subTot;
  });
  // Aggiungi tagliandi operatori bonus al totale
  getBonusRows().forEach(b => totale += b.tagliandi);
  document.getElementById('totale').textContent = totale;
}

// ── Submit ────────────────────────────────────────────────────
async function submitForm() {
  const op = document.getElementById('sel-operatrice').value;
  if (!op) { showToast('Seleziona un\'operatrice'); return; }

  const assenza = document.querySelector('input[name=assenza]:checked').value;
  if (assenza === 'ferie') {
    if (!confirm('Stai segnalando un\'assenza intera giornata. Confermi?')) return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '⏳ Invio...';

  // Calcola ore
  const opObj = getOperatrice(op);
  let orePresenza = opObj && opObj.orario && opObj.orario.length > 0
    ? calcolaOrePresenza(opObj.orario)
    : parseFloat(document.getElementById('ore-manuale').value) || 0;

  let oreAssenza = 0;
  if (assenza === 'ferie') oreAssenza = orePresenza;
  else if (assenza === 'permesso') {
    const pd = document.getElementById('permesso-dalle').value;
    const pa = document.getElementById('permesso-alle').value;
    if (pd && pa) oreAssenza = (timeToMin(pa) - timeToMin(pd)) / 60;
  }
  const extras   = getExtraItems();
  const oreExtra = extras.reduce((s, e) => s + e.minuti / 60, 0);
  const oreSRS   = Math.max(0, orePresenza - oreAssenza - oreExtra);

  // Raccoglie valori da tutte le categorie
  const tutteCat = tutteLeCategorie();
  const valori = {};
  tutteCat.forEach(c => { valori[c.id] = parseInt(document.getElementById('c-'+c.id)?.value) || 0; });

  const totaleTaglia = tutteCat.filter(c => c.tagliando).reduce((s,c) => s + (valori[c.id]||0), 0);
  const totaleSRS    = tutteCat.filter(c => c.srs).reduce((s,c) => s + (valori[c.id]||0), 0);
  const chiamateTot  = tutteCat
    .filter(c => c.label === 'Senza contatto' || c.label === 'Senza risposta' || c.label === 'Risposta')
    .reduce((s,c) => s + (valori[c.id]||0), 0);

  const bonusRows = getBonusRows();
  const bonusTot = bonusRows.reduce((s, b) => s + b.tagliandi, 0);

  const payload = {
    data: new Date().toLocaleDateString('it-IT'),
    operatrice: op,
    ore_presenza: orePresenza,
    ore_assenza: oreAssenza,
    tipo_assenza: assenza,
    ore_extra: parseFloat(oreExtra.toFixed(2)),
    attivita_extra: extras.map(e => `${e.tipo} (${(e.minuti/60).toFixed(1)}h)`).join(', '),
    ore_srs: parseFloat(oreSRS.toFixed(2)),
    sezioni: CONFIG.sezioni,
    valori,
    totale_tagliandi: totaleTaglia + bonusTot,
    totale_srs: totaleSRS,
    chiamate_totali: chiamateTot,
    operatori_bonus: bonusRows,
    note: document.getElementById('note').value.trim()
  };

  try {
    await fetch(CONFIG.googleSheets.scriptUrl, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('bottom-bar').style.display = 'none';
    document.getElementById('success-title').textContent = `Ottimo lavoro, ${op}!`;
    document.getElementById('success-sub').textContent   = `Report del ${payload.data} · ${totaleTaglia} tagliand${totaleTaglia===1?'o':'i'}`;
    document.getElementById('success-ore').textContent   = `⏱ ${orePresenza}h presenza · ${oreSRS.toFixed(1)}h SRS pure`;
    document.getElementById('success-view').classList.add('show');
  } catch {
    showToast('Errore di connessione — riprova');
    btn.disabled = false; btn.textContent = '✓ Invia Report';
  }
}

function newReport() {
  document.getElementById('success-view').classList.remove('show');
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('sel-operatrice').value = '';
  document.getElementById('ore-auto-row').style.display = 'none';
  document.getElementById('ore-manuale-row').style.display = 'none';
  document.querySelector('input[name=assenza][value=nessuna]').checked = true;
  document.getElementById('assenza-permesso-detail').classList.remove('show');
  document.getElementById('extra-list').innerHTML = '';
  extraCount = 0;
  document.getElementById('bonus-list').innerHTML = '';
  bonusCount = 0;
  document.getElementById('note').value = '';
  tutteLeCategorie().forEach(c => {
    const el = document.getElementById('c-' + c.id);
    if (el) { el.value = 0; el.classList.remove('has-value-tag', 'has-value'); }
  });
  CONFIG.sezioni.forEach(sez => {
    const sub = document.getElementById('sub-' + sez.id);
    if (sub) sub.textContent = '0';
  });
  document.getElementById('totale').textContent = '0';
  ricalcolaOreSRS();
  const btn = document.getElementById('submit-btn');
  btn.disabled = CONFIG.googleSheets.scriptUrl.includes('INCOLLA_QUI');
  btn.textContent = '✓ Invia Report';
}

// ── Operatori bonus ──────────────────────────────────────────
let bonusCount = 0;

function addBonusRow() {
  const id = ++bonusCount;
  const list = document.getElementById('bonus-list');
  const item = document.createElement('div');
  item.className = 'bonus-item';
  item.id = `bonus-${id}`;
  item.innerHTML = `
    <input type="text" class="bonus-nome" id="bonus-nome-${id}" placeholder="Nome operatore" maxlength="40">
    <input type="number" class="bonus-num" id="bonus-num-${id}" min="0" max="20" value="1" inputmode="numeric" oninput="updateTotali()">
    <button class="bonus-remove" onclick="removeBonus(${id})">✕</button>`;
  list.appendChild(item);
  document.getElementById(`bonus-nome-${id}`).focus();
  updateTotali();
}

function removeBonus(id) {
  document.getElementById(`bonus-${id}`)?.remove();
  updateTotali();
}

function getBonusRows() {
  const items = [];
  document.querySelectorAll('.bonus-item').forEach(el => {
    const id = el.id.replace('bonus-', '');
    const nome = document.getElementById(`bonus-nome-${id}`)?.value.trim() || '';
    const num  = parseInt(document.getElementById(`bonus-num-${id}`)?.value) || 0;
    if (nome && num > 0) items.push({ nome, tagliandi: num });
  });
  return items;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
